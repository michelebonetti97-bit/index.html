<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MB Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Configurazione Web App MB Finance -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#1c3d27">
    <meta name="apple-mobile-web-app-title" content="MB Finance">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/1c3d27/v.png">
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('MB Finance configurata con successo!'))
                .catch((err) => console.log('Errore configurazione:', err));
        }
    </script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        terra: '#f5f1ea', // Sfondo Panna
                        verdescuro: '#1c3d27', // Verdone
                        verdescurohover: '#132b1c',
                        testoscuro: '#2b2927',
                        grigiomorbido: '#7e7873'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f5f1ea; color: #2b2927; -webkit-tap-highlight-color: transparent; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: #1c3d27; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.6; cursor: pointer; }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-md mx-auto px-4 pt-6">
        
        <!-- SEZIONE HOME -->
        <div id="home" class="view active">
            <header class="mb-5 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">MB Finance</h1>
                    <p id="date-now" class="text-sm text-grigiomorbido capitalize"></p>
                </div>
                <div class="bg-white/80 border border-black/[0.02] rounded-2xl px-4 py-2 text-right shadow-sm">
                    <span class="block text-[9px] font-bold uppercase tracking-wider text-grigiomorbido">Disponibile Reale</span>
                    <span id="real-balance" class="text-base font-bold text-testoscuro">0,00€</span>
                </div>
            </header>

            <!-- CARD BUDGET MENSILE -->
            <section class="bg-white rounded-[2rem] p-5 shadow-sm border border-black/[0.02] mb-5">
                <div class="flex justify-between items-center mb-3">
                    <div>
                        <span class="block text-[10px] font-bold uppercase tracking-wider text-grigiomorbido">Budget di Spesa</span>
                        <div class="flex items-center gap-1.5 mt-0.5">
                            <span class="text-xl font-bold text-testoscuro">€</span>
                            <input type="number" id="budget-input" onchange="updateBudget(this.value)" placeholder="Imposta" class="text-xl font-bold text-testoscuro w-24 bg-transparent border-none outline-none focus:bg-terra/50 rounded px-1">
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="block text-[10px] font-bold uppercase tracking-wider text-grigiomorbido">Residuo Budget</span>
                        <span id="budget-remaining" class="text-lg font-bold text-verdescuro">0,00€</span>
                    </div>
                </div>
                <div class="w-full bg-terra h-3 rounded-full overflow-hidden">
                    <div id="budget-bar" class="bg-verdescuro h-full transition-all duration-500 rounded-full" style="width: 0%"></div>
                </div>
            </section>

            <!-- MODULO DI INSERIMENTO -->
            <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-black/[0.02] mb-6">
                <form onsubmit="addTransaction(event)">
                    <div class="grid grid-cols-2 gap-2 p-1 bg-terra rounded-2xl mb-5">
                        <button type="button" id="type-uscita" onclick="setType('uscita')" class="py-2 text-sm font-semibold rounded-xl transition-all bg-white shadow-sm">Spesa</button>
                        <button type="button" id="type-entrata" onclick="setType('entrata')" class="py-2 text-sm font-semibold rounded-xl transition-all text-grigiomorbido">Entrata</button>
                    </div>

                    <div class="mb-4 text-center">
                        <div class="flex items-center justify-center">
                            <span class="text-3xl font-bold mr-1">€</span>
                            <input type="number" id="amount" step="0.01" placeholder="0,00" required class="text-4xl font-bold bg-transparent border-none outline-none w-40">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="category" class="block text-xs font-medium text-grigiomorbido uppercase tracking-wider mb-1.5 px-1">Categoria</label>
                        <select id="category" class="w-full bg-terra rounded-xl px-4 py-3 text-sm font-medium outline-none appearance-none cursor-pointer"></select>
                    </div>

                    <div class="mb-4">
                        <label for="description" class="block text-xs font-medium text-grigiomorbido uppercase tracking-wider mb-1.5 px-1">Nota (opzionale)</label>
                        <input type="text" id="description" placeholder="Nota opzionale..." class="w-full bg-terra rounded-xl px-4 py-3 text-sm outline-none">
                    </div>

                    <div class="mb-5">
                        <label for="transaction-date" class="block text-xs font-medium text-grigiomorbido uppercase tracking-wider mb-1.5 px-1">Data Transazione</label>
                        <input type="date" id="transaction-date" required class="w-full bg-terra rounded-xl px-4 py-3 text-sm font-medium text-testoscuro outline-none">
                    </div>

                    <button type="submit" class="w-full bg-verdescuro hover:bg-verdescurohover text-white font-semibold rounded-xl py-4 shadow-sm active:scale-95 transition-all">Registra</button>
                </form>
            </div>

            <h2 class="text-xs font-bold uppercase tracking-widest text-grigiomorbido mb-4 px-1">Ultimi Movimenti</h2>
            <div id="recent-list" class="space-y-3 px-1"></div>
        </div>

        <!-- SEZIONE ARCHIVIO -->
        <div id="archive" class="view">
            <header class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Archivio</h1>
                    <p class="text-sm text-grigiomorbido">Storico mesi precedenti</p>
                </div>
                <button onclick="exportToExcel()" class="bg-verdescuro hover:bg-verdescurohover text-white text-xs font-semibold px-4 py-2.5 rounded-full shadow-sm flex items-center gap-1.5 active:scale-95 transition-all">
                    <i data-lucide="download" class="w-3.5 h-3.5"></i> Backup Excel
                </button>
            </header>
            <div id="archive-list" class="space-y-4"></div>
        </div>

        <!-- SEZIONE GRAFICI -->
        <div id="charts" class="view text-center">
            <header class="mb-6 text-left">
                <h1 class="text-2xl font-bold tracking-tight">Analisi Spese</h1>
                <p class="text-sm text-grigiomorbido">Distribuzione categorie</p>
            </header>
            <div class="bg-white rounded-[2rem] p-6 shadow-sm mb-6">
                <canvas id="categoryChart"></canvas>
            </div>
            <div id="chart-legend" class="grid grid-cols-2 gap-4 text-left px-2"></div>
        </div>

        <!-- SEZIONE AI -->
        <div id="ai" class="view">
            <header class="mb-6">
                <h1 class="text-2xl font-bold tracking-tight">AI Advisor</h1>
                <p class="text-sm text-grigiomorbido">Consigli personalizzati</p>
            </header>
            <div class="bg-verdescuro text-white rounded-[2rem] p-6 shadow-lg mb-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="bg-white/20 p-2 rounded-full"><i data-lucide="sparkles" class="w-5 h-5"></i></div>
                    <span class="font-bold">Analisi in tempo reale</span>
                </div>
                <p id="ai-suggestion" class="text-sm leading-relaxed opacity-90 italic">Caricamento dati...</p>
            </div>
            <div id="ai-tips" class="space-y-4"></div>
        </div>

    </div>

    <!-- NAVBAR IN BASSO -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/80 backdrop-blur-xl border border-black/[0.05] rounded-full px-6 py-3 shadow-2xl flex justify-between items-center z-50">
        <button onclick="showView('home')" class="nav-item active flex flex-col items-center gap-1"><i data-lucide="plus-circle" class="w-6 h-6"></i><span class="text-[10px] font-bold">Home</span></button>
        <button onclick="showView('archive')" class="nav-item flex flex-col items-center gap-1 text-grigiomorbido"><i data-lucide="calendar" class="w-6 h-6"></i><span class="text-[10px] font-bold">Archivio</span></button>
        <button onclick="showView('charts')" class="nav-item flex flex-col items-center gap-1 text-grigiomorbido"><i data-lucide="pie-chart" class="w-6 h-6"></i><span class="text-[10px] font-bold">Grafici</span></button>
        <button onclick="showView('ai')" class="nav-item flex flex-col items-center gap-1 text-grigiomorbido"><i data-lucide="bot" class="w-6 h-6"></i><span class="text-[10px] font-bold">AI Tips</span></button>
    </nav>

    <script>
        const categories = [
            { id: 'pranzo', name: 'Pranzo', icon: 'utensils', color: '#f59e0b' },
            { id: 'spesa', name: 'Spesa', icon: 'shopping-cart', color: '#10b981' },
            { id: 'casa', name: 'Casa', icon: 'home', color: '#3b82f6' },
            { id: 'cena', name: 'Cena', icon: 'soup', color: '#8b5cf6' },
            { id: 'aperitivo', name: 'Aperitivo', icon: 'glass-water', color: '#f43f5e' },
            { id: 'uscita', name: 'Uscita', icon: 'ticket', color: '#ec4899' },
            { id: 'holiday', name: 'Holiday', icon: 'palmtree', color: '#06b6d4' },
            { id: 'amici', name: 'Amici', icon: 'users', color: '#6366f1' },
            { id: 'luce', name: 'Luce', icon: 'zap', color: '#fbbf24' },
            { id: 'gas', name: 'Gas', icon: 'flame', color: '#f97316' },
            { id: 'utenze varie', name: 'Utenze', icon: 'file-text', color: '#94a3b8' },
            { id: 'benzina', name: 'Benzina', icon: 'fuel', color: '#475569' },
            { id: 'auto', name: 'Auto', icon: 'car', color: '#1e293b' },
            { id: 'regalo', name: 'Regalo', icon: 'gift', color: '#d946ef' },
            { id: 'trasporti', name: 'Trasporti', icon: 'bus', color: '#22c55e' },
            { id: 'stipendio', name: 'Stipendio', icon: 'briefcase', color: '#1c3d27' },
            { id: 'altre entrate', name: 'Altre Entrate', icon: 'trending-up', color: '#059669' },
            { id: 'arbitro', name: 'Arbitro', icon: 'award', color: '#d97706' },
            { id: 'shopping', name: 'Shopping', icon: 'shopping-bag', color: '#000000' }
        ];

        let currentType = 'uscita';
        let transactions = JSON.parse(localStorage.getItem('fin_ai_data')) || [];
        let monthlyBudget = parseFloat(localStorage.getItem('fin_budget')) || 0;
        let myChart = null;

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active', 'text-verdescuro'));
            event.currentTarget.classList.add('active', 'text-verdescuro');
            if(viewId === 'charts') renderChart();
            if(viewId === 'ai') renderAI();
            if(viewId === 'archive') renderArchive();
            lucide.createIcons();
        }

        function setType(type) {
            currentType = type;
            document.getElementById('type-uscita').className = type === 'uscita' ? "py-2 text-sm font-semibold rounded-xl transition-all bg-white shadow-sm" : "py-2 text-sm font-semibold rounded-xl transition-all text-grigiomorbido";
            document.getElementById('type-entrata').className = type === 'entrata' ? "py-2 text-sm font-semibold rounded-xl transition-all bg-white shadow-sm" : "py-2 text-sm font-semibold rounded-xl transition-all text-grigiomorbido";
        }

        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('transaction-date').value = today;
        }

        function updateBudget(value) {
            monthlyBudget = parseFloat(value) || 0;
            localStorage.setItem('fin_budget', monthlyBudget);
            calculateFinances();
        }

        function addTransaction(e) {
            e.preventDefault();
            const inputDate = document.getElementById('transaction-date').value;
            const chosenDate = new Date(inputDate);

            const transaction = {
                id: Date.now(),
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                description: document.getElementById('description').value.trim(),
                type: currentType,
                date: chosenDate.toISOString()
            };

            transactions.unshift(transaction);
            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem('fin_ai_data', JSON.stringify(transactions));
            
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            setDefaultDate(); 
            updateHome();
        }

        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('fin_ai_data', JSON.stringify(transactions));
            updateHome();
        }

        function calculateFinances() {
            let totalIncome = 0;
            let totalExpense = 0;
            let currentMonthExpense = 0;

            const now = new Date();
            const currentMonthStr = now.toLocaleString('it-IT', { month: 'long', year: 'numeric' });

            transactions.forEach(t => {
                if (t.type === 'entrata') {
                    totalIncome += t.amount;
                } else {
                    totalExpense += t.amount;
                    const tMonthStr = new Date(t.date).toLocaleString('it-IT', { month: 'long', year: 'numeric' });
                    if(tMonthStr === currentMonthStr) {
                        currentMonthExpense += t.amount;
                    }
                }
            });

            const realBalance = totalIncome - totalExpense;
            document.getElementById('real-balance').innerText = `${realBalance.toFixed(2)}€`;

            const remainingBudget = monthlyBudget - currentMonthExpense;
            const remainingEl = document.getElementById('budget-remaining');
            remainingEl.innerText = `${remainingBudget.toFixed(2)}€`;

            if(remainingBudget < 0) {
                remainingEl.className = "text-lg font-bold text-rose-600";
            } else {
                remainingEl.className = "text-lg font-bold text-verdescuro";
            }

            const bar = document.getElementById('budget-bar');
            if (monthlyBudget > 0) {
                let percentage = (currentMonthExpense / monthlyBudget) * 100;
                if(percentage > 100) percentage = 100;
                bar.style.width = `${percentage}%`;
                
                if(percentage >= 100) bar.className = "bg-rose-500 h-full transition-all duration-500 rounded-full";
                else if(percentage > 80) bar.className = "bg-amber-500 h-full transition-all duration-500 rounded-full";
                else bar.className = "bg-verdescuro h-full transition-all duration-500 rounded-full";
            } else {
                bar.style.width = '0%';
                bar.className = "bg-verdescuro h-full transition-all duration-500 rounded-full";
            }
        }

        function updateHome() {
            calculateFinances();
            
            const list = document.getElementById('recent-list');
            list.innerHTML = '';
            transactions.slice(0, 8).forEach(t => {
                const cat = categories.find(c => c.id === t.category);
                list.innerHTML += `
                    <div class="flex items-center justify-between bg-white/50 p-3 rounded-2xl border border-black/[0.01]">
                        <div class="flex items-center gap-3">
                            <div class="bg-terra p-2 rounded-xl"><i data-lucide="${cat.icon}" class="w-4 h-4"></i></div>
                            <div>
                                <span class="block text-sm font-bold">${t.description || cat.name}</span>
                                <span class="text-[10px] text-grigiomorbido">${new Date(t.date).toLocaleDateString('it-IT')}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="font-bold ${t.type === 'entrata' ? 'text-emerald-600' : 'text-testoscuro'}">
                                ${t.type === 'entrata' ? '+' : '-'}${t.amount.toFixed(2)}€
                            </span>
                            <button onclick="deleteTransaction(${t.id})" class="text-grigiomorbido/30 hover:text-rose-600 p-1 transition-colors">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }

        function exportToExcel() {
            if (transactions.length === 0) {
                alert("Non ci sono dati da esportare!");
                return;
            }
            let csvContent = "data:text/csv;charset=utf-8,Data;Tipo;Categoria;Importo;Nota\n";
            transactions.forEach(t => {
                const dateStr = new Date(t.date).toLocaleDateString('it-IT');
                const catObj = categories.find(c => c.id === t.category) || { name: t.category };
                const note = t.description ? t.description.replace(/;/g, ",") : "";
                csvContent += `${dateStr};${t.type.toUpperCase()};${catObj.name};${t.amount.toFixed(2)};${note}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Backup_Spese_${new Date().toLocaleDateString('it-IT')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function renderChart() {
            const expenseData = transactions.filter(t => t.type === 'uscita');
            const totals = {};
            expenseData.forEach(t => totals[t.category] = (totals[t.category] || 0) + t.amount);
            
            const labels = Object.keys(totals).map(k => categories.find(c => c.id === k).name);
            const values = Object.values(totals);
            const colors = Object.keys(totals).map(k => categories.find(c => c.id === k).color);

            if(myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '70%' }
            });

            const legend = document.getElementById('chart-legend');
            legend.innerHTML = '';
            Object.keys(totals).forEach(k => {
                const cat = categories.find(c => c.id === k);
                legend.innerHTML += `<div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full" style="background:${cat.color}"></div><span class="text-xs font-medium">${cat.name}: ${totals[k].toFixed(0)}€</span></div>`;
            });
        }

        function renderAI() {
            const expenses = transactions.filter(t => t.type === 'uscita');
            if(expenses.length === 0) {
                document.getElementById('ai-suggestion').innerText = "Inizia a registrare qualche spesa per ricevere i miei consigli!";
                return;
            }
            const catTotals = {};
            expenses.forEach(t => catTotals[t.category] = (catTotals[t.category] || 0) + t.amount);
            let tip = "Analisi completata. Il tuo profilo di spesa è equilibrato.";
            if((catTotals['aperitivo'] || 0) > (catTotals['spesa'] || 1) * 0.5) tip = "Ho notato che spendi molto in 'Aperitivi' rispetto alla 'Spesa Casa'. Forse potresti limitare le uscite settimanali per risparmiare.";
            else if ((catTotals['shopping'] || 0) > 200) tip = "Questo mese lo shopping ha inciso molto. Valuta di rimandare gli acquisti non essenziali al prossimo mese.";
            document.getElementById('ai-suggestion').innerText = `"${tip}"`;
        }

        function renderArchive() {
            const groups = transactions.reduce((acc, t) => {
                const month = new Date(t.date).toLocaleString('it-IT', { month: 'long', year: 'numeric' });
                if(!acc[month]) acc[month] = { income: 0, expense: 0 };
                if(t.type === 'entrata') acc[month].income += t.amount; else acc[month].expense += t.amount;
                return acc;
            }, {});

            const archList = document.getElementById('archive-list');
            archList.innerHTML = '';
            if(Object.keys(groups).length === 0) {
                archList.innerHTML = `<p class="text-xs text-center text-grigiomorbido/60 py-8">Nessun mese in archivio per ora.</p>`;
                return;
            }
            Object.entries(groups).forEach(([month, data]) => {
                archList.innerHTML += `
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-black/[0.01]">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-bold capitalize">${month}</h3>
                            <span class="text-xs font-bold text-verdescuro bg-terra px-2 py-1 rounded-lg">Saldo: ${(data.income - data.expense).toFixed(2)}€</span>
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1"><span class="block text-[10px] text-grigiomorbido uppercase">Entrate</span><span class="text-emerald-600 font-bold">+${data.income.toFixed(2)}€</span></div>
                            <div class="flex-1 text-right"><span class="block text-[10px] text-grigiomorbido uppercase">Uscite</span><span class="text-rose-600 font-bold">-${data.expense.toFixed(2)}€</span></div>
                        </div>
                    </div>`;
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            const select = document.getElementById('category');
            categories.forEach(c => select.innerHTML += `<option value="${c.id}">${c.name}</option>`);
            document.getElementById('date-now').innerText = new Date().toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
            if(monthlyBudget > 0) document.getElementById('budget-input').value = monthlyBudget;
            setDefaultDate();
            updateHome();
            lucide.createIcons();
        });
    </script>
</body>
</html>
